<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shopee Affiliate Notes</title>
    <style>
        :root {
            --primary-color: #ee4d2d; 
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px; /* Padding luar diperkecil */
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--card-bg);
            border-radius: 8px; /* Sudut lebih kotak untuk kesan rapi */
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 15px; /* Padding dalam kotak dirapatkan */
        }
        h1 {
            color: var(--primary-color);
            text-align: center;
            font-size: 20px; /* Ukuran judul sedikit dikecilkan */
            margin: 0 0 10px 0;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .note-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        .note-item {
            padding: 8px 0; /* Jarak atas-bawah tiap produk sangat dirapatkan */
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            gap: 2px; /* Jarak antara nama dan link dirapatkan */
        }
        /* Menghilangkan garis bawah pada item terakhir */
        .note-item:last-child {
            border-bottom: none;
            padding-bottom: 0; 
        }
        .product-name {
            font-size: 15px;
            font-weight: 600;
            color: #333;
        }
        .product-link {
            font-size: 13px; /* Ukuran font link dikecilkan sedikit */
            color: #0056b3;
            text-decoration: underline;
            word-break: break-all;
        }
        .product-link:hover {
            color: #003d82;
        }
        .loading, .error {
            text-align: center;
            color: #666;
            padding: 15px;
            font-size: 14px;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Catatan Affiliate</h1>
        <div id="status" class="loading">Memuat produk...</div>
        <ul class="note-list" id="productList"></ul>
    </div>

    <script>
        // GANTI URL DI BAWAH DENGAN URL RAW GIST GITHUB ANDA
        const GIST_URL = 'https://gist.githubusercontent.com/ekoanugrah/6bb24a5a80822c9287893708efbfe1c8/raw/bfaaa04d649599a47254eed53f3d61c30bdee402/produkaffiliate.json';

        const productList = document.getElementById('productList');
        const statusDiv = document.getElementById('status');

        async function fetchProducts() {
            try {
                const response = await fetch(GIST_URL);
                if (!response.ok) {
                    throw new Error('Gagal mengambil data jaringan');
                }
                const data = await response.json();
                
                statusDiv.style.display = 'none';

                data.forEach(product => {
                    const li = document.createElement('li');
                    li.className = 'note-item';
                    
                    // Kategori dihapus, hanya menampilkan nama dan link
                    li.innerHTML = `
                        <span class="product-name">${product.nama}</span>
                        <a href="${product.link}" class="product-link" target="_blank" rel="noopener noreferrer">
                            ${product.link}
                        </a>
                    `;
                    
                    productList.appendChild(li);
                });

            } catch (error) {
                statusDiv.className = 'error';
                statusDiv.innerText = 'Gagal memuat catatan produk. Pastikan URL Gist benar.';
                console.error('Error fetching data:', error);
            }
        }

        fetchProducts();
    </script>
</body>
</html>
