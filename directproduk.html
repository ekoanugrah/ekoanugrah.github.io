<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Link Shopee</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        select, button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        button {
            background-color: #ee4d2d;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #d73a1e;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Pilih Produk Shopee</h2>
        
        <select id="daftarProduk">
            <option value="">Memuat data produk...</option>
        </select>

        <button id="tombolProses">Proses & Buka Shopee</button>
    </div>

    <script>
        // PASTIKAN MENGGANTI INI DENGAN LINK RAW GITHUB GIST ANDA
        const jsonUrl = 'https://gist.githubusercontent.com/ekoanugrah/742c882ead1556d00b1a060026749a5e/raw/bae63de25f860c2a6a14b93566ed5108d891e9df/produk.json'; 

        const selectElemen = document.getElementById('daftarProduk');
        const tombolProses = document.getElementById('tombolProses');

        async function muatData() {
            try {
                const response = await fetch(jsonUrl);
                
                if (!response.ok) {
                    throw new Error('Jaringan bermasalah atau link salah');
                }

                const dataProduk = await response.json();
                
                selectElemen.innerHTML = '<option value="">-- Pilih Produk --</option>';

                dataProduk.forEach(produk => {
                    const option = document.createElement('option');
                    option.value = produk.link;
                    option.textContent = produk.nama;
                    selectElemen.appendChild(option);
                });
            } catch (error) {
                selectElemen.innerHTML = '<option value="">Gagal memuat data produk</option>';
                console.error("Terjadi kesalahan:", error);
            }
        }

        muatData();

        // LOGIKA TOMBOL PROSES KHUSUS MEDIAN.CO
        tombolProses.addEventListener('click', function() {
            const linkTerpilih = selectElemen.value;
            
            if (linkTerpilih === "") {
                alert("Silakan pilih produk terlebih dahulu!");
            } else {
                
                // 1. Memerintahkan Median untuk membuka link ke aplikasi eksternal (Shopee)
                // Ini memastikan link tidak terbuka di dalam aplikasi Anda
                window.location.href = 'median://open/external?url=' + encodeURIComponent(linkTerpilih);

                // 2. Memberikan jeda 800 milidetik (agar link di atas sempat tereksekusi), 
                // lalu memerintahkan Median untuk MENUTUP PAKSA aplikasi ini.
                setTimeout(function() {
                    window.location.href = 'median://app/exit';
                }, 800);
                
            }
        });
    </script>
</body>
</html>
