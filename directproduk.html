<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shopee Affiliate Notes</title>
    <style>
        :root {
            --primary-color: #ee4d2d; 
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 15px;
        }
        h1 {
            color: var(--primary-color);
            text-align: center;
            font-size: 20px;
            margin: 0 0 10px 0;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .note-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        .note-item {
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .note-item:last-child {
            border-bottom: none;
            padding-bottom: 0; 
        }
        .product-name {
            font-size: 15px;
            font-weight: 600;
            color: #333;
        }
        .product-link {
            font-size: 13px;
            color: #0056b3;
            text-decoration: underline;
            word-break: break-all;
            cursor: pointer; /* Menandakan ini bisa diklik */
        }
        .product-link:hover {
            color: #003d82;
        }
        .loading, .error {
            text-align: center;
            color: #666;
            padding: 15px;
            font-size: 14px;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Catatan Affiliate</h1>
        <div id="status" class="loading">Memuat produk...</div>
        <ul class="note-list" id="productList"></ul>
    </div>

    <script>
        // GANTI URL DI BAWAH DENGAN URL RAW GIST GITHUB ANDA
        const GIST_URL = 'https://gist.githubusercontent.com/ekoanugrah/6bb24a5a80822c9287893708efbfe1c8/raw/a5f1a8e1c415d61c9fd6f0bfee498bf32dbc2b0c/produkaffiliate.json';

        const productList = document.getElementById('productList');
        const statusDiv = document.getElementById('status');

        // Fungsi baru untuk menangani klik, buka Shopee, dan tutup aplikasi Median
        function bukaDanTutup(url) {
            // 1. Membuka link Shopee. Gunakan _blank agar Median mendeteksinya sebagai eksternal
            window.open(url, '_blank');
            
            // 2. Beri jeda 800ms agar sistem OS sempat meluncurkan Shopee
            // lalu jalankan perintah Median untuk menutup window/aplikasi
            setTimeout(() => {
                // Memanggil protokol Median untuk menutup window saat ini
                window.location.href = 'median://window/close';
                
                // Fallback jika dibuka di browser biasa (bukan di dalam Median app)
                window.close();
            }, 800);
        }

        async function fetchProducts() {
            try {
                const response = await fetch(GIST_URL);
                if (!response.ok) {
                    throw new Error('Gagal mengambil data jaringan');
                }
                const data = await response.json();
                
                statusDiv.style.display = 'none';

                data.forEach(product => {
                    const li = document.createElement('li');
                    li.className = 'note-item';
                    
                    // Kita ubah tag <a> agar memanggil fungsi javascript bukaDanTutup()
                    li.innerHTML = `
                        <span class="product-name">${product.nama}</span>
                        <a onclick="bukaDanTutup('${product.link}')" class="product-link">
                            ${product.link}
                        </a>
                    `;
                    
                    productList.appendChild(li);
                });

            } catch (error) {
                statusDiv.className = 'error';
                statusDiv.innerText = 'Gagal memuat catatan produk. Pastikan URL Gist benar.';
                console.error('Error fetching data:', error);
            }
        }

        fetchProducts();
    </script>
</body>
</html>
