<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auto Convert & Copy</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border: 2px solid #1a73e8; border-radius: 8px; font-size: 18px; text-align: center; }
        .paste-btn { background-color: #1a73e8; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 20px; }
        .result-box { padding: 15px; background: #f8f9fa; border: 2px dashed #ccc; border-radius: 8px; }
        .result-text { font-size: 22px; font-weight: bold; color: #34a853; display: block; margin: 10px 0; }
        .status-msg { font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Smart Converter</h2>
    <input type="tel" id="phoneInput" placeholder="Tempel nomor di sini..." autofocus>
    
    <button id="pasteBtn" class="paste-btn">📋 TEMPEL (PASTE)</button>
    
    <div class="result-box" id="boxHasil">
        <small>HASIL (OTOMATIS DISALIN):</small>
        <span class="result-text" id="result">-</span>
        <div id="statusMsg" class="status-msg"></div>
    </div>
</div>

<script>
    const inputEl = document.getElementById('phoneInput');
    const pasteBtn = document.getElementById('pasteBtn');
    const resultEl = document.getElementById('result');
    const statusEl = document.getElementById('statusMsg');

    // Fungsi Paste Otomatis
    pasteBtn.addEventListener('click', async () => {
        try {
            const text = await navigator.clipboard.readText();
            inputEl.value = text;
            prosesOtomatis(text);
        } catch (err) {
            statusEl.innerText = "Tekan lama pada kotak untuk Tempel manual";
            inputEl.focus();
        }
    });

    // Deteksi input manual atau dari paste manual
    inputEl.addEventListener('input', (e) => prosesOtomatis(e.target.value));

    function prosesOtomatis(text) {
        let cleanNumber = text.replace(/[^\d+]/g, '');
        let nomorInti = cleanNumber;

        if (cleanNumber.startsWith('+62')) nomorInti = cleanNumber.slice(3);
        else if (cleanNumber.startsWith('62')) nomorInti = cleanNumber.slice(2);
        else if (cleanNumber.startsWith('0')) nomorInti = cleanNumber.slice(1);

        if (nomorInti.length >= 8) {
            const hasilFinal = '7810' + nomorInti;
            resultEl.innerText = hasilFinal;
            
            // Salin ke clipboard otomatis
            navigator.clipboard.writeText(hasilFinal);
            
            statusEl.innerText = "✓ Berhasil diubah & disalin!";
            statusEl.style.color = "#34a853";
        }
    }
</script>
</body>
</html>
